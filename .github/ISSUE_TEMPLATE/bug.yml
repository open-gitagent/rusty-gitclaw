name: Bug Report
description: Report something that's broken
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Be specific. Include error messages if any.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Version
      description: "Output of `gitclaw --version` or git commit hash"
    validations:
      required: false

  - type: input
    id: environment
    attributes:
      label: Environment
      description: "OS, Rust version (rustc --version)"
    validations:
      required: false
